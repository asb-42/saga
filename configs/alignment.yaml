# configs/alignment.yaml
# Dataset reduced from original 700k/10 epochs to 70k/3 epochs.
# Rationale: 700k × 10 epochs × 3 model forward passes ≈ 60+ days on A100.
# 70k × 3 epochs ≈ 3-4 days on 2× A100 80GB; sufficient to validate hypothesis.

training:
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  epochs: 3
  warmup_steps: 200
  temperature: 0.07       # InfoNCE tau
  max_seq_len: 256
  grad_clip: 1.0
  bf16: true
  seed: 42

data:
  sources:
    - name: "c4"
      hf_path: "allenai/c4"
      subset: "en"
      split: "train"
      max_samples: 50000
    - name: "redpajama"
      hf_path: "togethercomputer/RedPajama-Data-1T-Sample"
      split: "train"
      max_samples: 20000
  validation_split: 0.05
  seed: 42

projector:
  hidden_dim: 1024
  output_dim: 1024
  activation: "gelu"
  dropout: 0.1

checkpointing:
  save_every_n_steps: 500
  output_dir: "checkpoints/alignment"
  resume_from: null     # set to checkpoint path to resume interrupted training

logging:
  log_every_n_steps: 50
  tensorboard_dir: "runs/alignment"
