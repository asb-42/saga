# configs/router.yaml

architecture:
  input_dim: 1024
  num_layers: 2
  num_heads: 8
  ff_dim: 2048
  dropout: 0.1
  # num_models is derived at runtime from len(base_models) in models.yaml
  # Do NOT hardcode here.
  top_k: 2

autoencoder:
  encoder_dims: [1024, 256, 32]
  decoder_dims: [32, 256, 1024]
  activation: "relu"
  anomaly_fpr_target: 0.05

oracle_training:
  batch_size: 32
  learning_rate: 1.0e-4
  epochs: 10
  data_path: "data/oracle_labels.jsonl"
  seed: 42

rlaif:
  learning_rate: 5.0e-6
  kl_coeff: 0.1
  episodes: 5000
  rollout_batch: 16
  seed: 42

checkpointing:
  output_dir: "checkpoints/router"
  save_every_n_steps: 500

logging:
  tensorboard_dir: "runs/router"
